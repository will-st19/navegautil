<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora de Lucro Shopee | Navega Útil</title>
    <link rel="stylesheet" href="../style.css">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2662XNH7F6"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-2662XNH7F6');
    </script>
</head>
<body>
    <header></header>
    <main>
        <h1>Calculadora Shopee (20% + R$4)</h1>
        <p>Descubra quanto sobra no seu bolso depois que a Shopee "janta" sua margem.</p>

        <form class="calc-form">
            <label>Preço de Custo (Fornecedor):</label>
            <input type="number" id="custo" placeholder="Quanto você pagou? Ex: 20.00">
            
            <label>Preço de Venda (Anúncio):</label>
            <input type="number" id="venda" placeholder="Por quanto vai vender? Ex: 50.00">
            
            <button type="button" onclick="calcularLucroShopee()">Calcular Lucro Real</button>
            <button type="button" id="btnLimpar" onclick="limparCalculadora()" disabled>Limpar</button>
            
            <div id="area-resultado" style="margin-top: 20px; font-weight: bold;">
                <p id="resultado"></p>
                <p id="margem" style="font-size: 0.9em; color: #666;"></p>
                <p id="aviso" style="margin-top: 10px;"></p>
            </div>
        </form>
    </main>
    <footer></footer>
    <script src="../componentes/layout.js"></script>
    <script src="calculadora-shopee.js"></script>
</body>
</html>
